version: "3.1"

intents:
  - greet
  - goodbye
  - affirm
  - deny
  - mood_great
  - mood_unhappy
  - bot_challenge
  - ask_help
  - telegram_specific
  - facebook_specific

entities:
  - person
  - platform

slots:
  platform:
    type: text
    influence_conversation: true
    mappings:
    - type: from_entity
      entity: platform

responses:
  utter_greet:
  - text: "¡Hola! Soy tu bot multicanal. ¿En qué puedo ayudarte?"
  - text: "¡Bienvenido! Estoy aquí para ayudarte tanto en Telegram como en Facebook."

  utter_cheer_up:
  - text: "Aquí tienes algo para animarte:"
    image: "https://i.imgur.com/nGF1K8f.jpg"

  utter_did_that_help:
  - text: "¿Te sirvió esa información?"

  utter_happy:
  - text: "¡Genial! Me alegra poder ayudarte."

  utter_goodbye:
  - text: "¡Hasta luego!"
  - text: "¡Que tengas un buen día!"

  utter_iamabot:
  - text: "Soy un bot creado con Rasa que funciona tanto en Telegram como en Facebook Messenger."

  utter_help:
  - text: "Puedo ayudarte con varias cosas. Solo pregúntame lo que necesites."
  - text: "Estoy aquí para ayudarte. ¿Qué necesitas saber?"

  utter_telegram_specific:
  - text: "Esta es una funcionalidad específica de Telegram."

  utter_facebook_specific:
  - text: "Esta es una funcionalidad específica de Facebook Messenger."

  utter_default:
  - text: "Lo siento, no entendí tu mensaje. ¿Puedes reformularlo?"
  - text: "No estoy seguro de cómo ayudarte con eso. ¿Puedes ser más específico?"

actions:
  - action_detect_platform
  - action_custom_response

session_config:
  session_expiration_time: 60
  carry_over_slots_to_new_session: true