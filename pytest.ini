[tool:pytest]
# Configuración de pytest para Facebook Messenger Bot
# Desarrollado por Panacea Icono S.A.

testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Opciones de salida
addopts = 
    -v
    --tb=short
    --strict-markers
    --disable-warnings
    --color=yes

# Marcadores personalizados
markers =
    unit: Tests unitarios
    integration: Tests de integración
    slow: Tests que tardan mucho tiempo
    facebook: Tests que requieren conexión a Facebook API

# Configuración de cobertura
[coverage:run]
source = .
omit = 
    tests/*
    venv/*
    env/*
    .venv/*
    .env/*

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    if self.debug:
    if settings.DEBUG
    raise AssertionError
    raise NotImplementedError
    if 0:
    if __name__ == .__main__.:
