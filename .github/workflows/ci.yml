name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

env:
  PYTHON_VERSION: "3.9"
  RASA_VERSION: "3.6.18"

jobs:
  lint-and-validate:
    runs-on: ubuntu-latest
    name: Lint and Validate RASA Files
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: ${{ env.PYTHON_VERSION }}

    - name: Cache pip dependencies
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: Install RASA
      run: |
        pip install --upgrade pip
        pip install rasa==${{ env.RASA_VERSION }}
        pip install rasa-sdk==3.6.2

    - name: Validate RASA data
      run: |
        rasa data validate --domain domain.yml

    - name: Validate RASA stories
      run: |
        rasa data validate stories --domain domain.yml

  test-training:
    runs-on: ubuntu-latest
    name: Test RASA Training
    needs: lint-and-validate
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: ${{ env.PYTHON_VERSION }}

    - name: Cache pip dependencies
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: Install RASA
      run: |
        pip install --upgrade pip
        pip install rasa==${{ env.RASA_VERSION }}
        pip install rasa-sdk==3.6.2

    - name: Train RASA model
      run: |
        rasa train --config config.yml --domain domain.yml --data data/

    - name: Upload trained model
      uses: actions/upload-artifact@v3
      with:
        name: rasa-model
        path: models/
        retention-days: 7

  test-actions:
    runs-on: ubuntu-latest
    name: Test Custom Actions
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: ${{ env.PYTHON_VERSION }}

    - name: Install dependencies
      run: |
        pip install --upgrade pip
        pip install rasa-sdk==3.6.2
        pip install pytest
        pip install requests

    - name: Test custom actions
      run: |
        python -m pytest actions/test_actions.py -v || echo "No tests found, skipping..."

  docker-build-test:
    runs-on: ubuntu-latest
    name: Test Docker Build
    needs: [lint-and-validate, test-training]
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build Docker image
      run: |
        docker build -f Dockerfile -t rasa-actions-test .

    - name: Test Docker Compose
      run: |
        # Create a minimal .env file for testing
        echo "TELEGRAM_BOT_TOKEN=test" > .env
        echo "FB_PAGE_TOKEN=test" >> .env
        echo "FB_APP_SECRET=test" >> .env
        echo "FB_VERIFY_TOKEN=test" >> .env
        
        # Test docker-compose validation
        docker-compose config

  security-scan:
    runs-on: ubuntu-latest
    name: Security Scan
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Run Trivy vulnerability scanner
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: 'fs'
        scan-ref: '.'
        format: 'sarif'
        output: 'trivy-results.sarif'

    - name: Upload Trivy scan results to GitHub Security tab
      uses: github/codeql-action/upload-sarif@v2
      with:
        sarif_file: 'trivy-results.sarif'