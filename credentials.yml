# =============================
# Credenciales de canales Rasa
# =============================

# Canal REST para pruebas rápidas
rest:
  ~

# Canal Telegram
telegram:
  access_token: "${TELEGRAM_BOT_TOKEN}"

# Canal Facebook Messenger
facebook:
  verify: "${FB_VERIFY_TOKEN}"
  secret: "${FB_APP_SECRET}"
  page-access-token: "${FB_PAGE_TOKEN}"

