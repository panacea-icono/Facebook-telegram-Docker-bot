# Channel credentials for Telegram and Facebook

telegram:
  access_token: "${TELEGRAM_BOT_TOKEN}"
  verify: "telegram_bot"
  webhook_url: "https://your-domain.com/webhooks/telegram/webhook"

facebook:
  verify: "${FB_VERIFY_TOKEN}"
  secret: "${FB_APP_SECRET}"
  page-access-token: "${FB_PAGE_TOKEN}"

# Optional: Add other channels like Slack, WhatsApp, etc.
# slack:
#   slack_token: "xoxb-your-slack-bot-token"
#   slack_channel: "your-channel"

# Rest API (for custom integrations)
rest: